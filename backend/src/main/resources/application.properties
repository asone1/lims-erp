# 預設設定：保留 PostgreSQL 彈性 (未來部署時可透過環境變數覆蓋)
# quarkus.datasource.db-kind=${DB_KIND:postgresql}
# quarkus.datasource.username=${DB_USERNAME:postgres}
# quarkus.datasource.password=${DB_PASSWORD:your_password}
# quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}}

###DB config
# --- 開發環境專用配置 (%dev) ---
# 使用 H2 記憶體資料庫「假裝」有資料庫，不需啟動實體 DB 或 Docker
# 注意：請確保 pom.xml 中有 io.quarkus:quarkus-jdbc-h2 依賴
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:lims_dev_db;DB_CLOSE_DELAY=-1
%dev.lims.db.mock=true

#本機容器執行會噴錯 直接關閉
%dev.quarkus.otel.enabled=false
#%dev.quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.bind-parameters=true
quarkus.hibernate-orm.log.sql=true
# Hibernate ORM 設定 (自動建立/更新資料表結構)
quarkus.hibernate-orm.database.generation=update
# 解決找不到 import.sql 的問題
quarkus.hibernate-orm.sql-load-script=no-file

###後端的網路設定
# 1. [埠號對齊] 改為 8081，以對齊 Nginx 設定中的 proxy_pass 目標
quarkus.http.port=8081
# 2. [跨網段通訊防呆] 必須綁定 0.0.0.0 
# 預設 Quarkus 可能只聽 127.0.0.1，這會導致 Docker 內的 Nginx (host.docker.internal) 請求被拒絕
quarkus.http.host=0.0.0.0

###LIMS設定檔
# 檔案就在 backend 目錄下，使用 ./ 即可
lims.config.path=./governance-config.json

###LIMS 所需ID dispatcher (目前使用gloud直接架設redis service)
# 明確指定 Redis 的連線網址（指向本機 Docker 映射出來的 6379）
quarkus.redis.hosts=redis://localhost:6379

# 可選：設定連線逾時時間（單位為 Java Duration 格式，例如 10 秒）
quarkus.redis.timeout=10s
