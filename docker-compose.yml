services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lims-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  reverse_proxy:
    image: nginx:alpine
    container_name: lims-gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80" 
    depends_on:
      - frontend
    # 💡 註：這裡刪除了 depends_on 底下的 backend，因為後端不在 Docker 裡了

    redis:
    image: redis:alpine
    container_name: lims-redis
    ports:
      - "6379:6379" # 映射到宿主機，讓外面的 Quarkus 可以連線
    command: redis-server --save 60 1 --loglevel warning